<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostalgický kvíz 90s/00s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================
     BASE
     ============================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(255, 62, 165, 0.15), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(0, 229, 212, 0.15), transparent 50%),
      linear-gradient(180deg, #1a0d2e 0%, #2d1b4e 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    background-attachment: fixed;
  }

  /* Decorative grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 62, 165, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 229, 212, 0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 2rem 3rem;
    display: none;
    animation: fadeIn 0.4s ease-out;
  }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
    50%      { box-shadow: 0 0 30px currentColor, 0 0 60px currentColor; }
  }
  @keyframes bonusShine {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* ============================
     HOME SCREEN
     ============================ */
  .home-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.4rem, 3.5vw, 2.5rem);
    background: linear-gradient(90deg, #ff3ea5, #00e5d4);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.4;
    text-shadow: 0 0 30px rgba(255, 62, 165, 0.5);
    margin-bottom: 1.5rem;
    letter-spacing: 2px;
  }
  .total-score {
    font-family: 'VT323', monospace;
    font-size: clamp(2.5rem, 5vw, 4rem);
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    letter-spacing: 3px;
  }
  .total-score-label {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .category-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .category-grid { grid-template-columns: 1fr; }
  }

  .category-tile {
    position: relative;
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(0, 229, 212, 0.3);
    border-radius: 1rem;
    padding: 2rem 1.2rem;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-align: center;
    backdrop-filter: blur(10px);
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .category-tile:hover {
    transform: translateY(-5px);
    border-color: #ff3ea5;
    box-shadow: 0 10px 30px rgba(255, 62, 165, 0.3), 0 0 30px rgba(255, 62, 165, 0.2);
  }
  .category-tile.completed {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.08);
    cursor: not-allowed;
    opacity: 0.7;
  }
  .category-tile.completed:hover {
    transform: none;
    box-shadow: none;
  }
  .category-icon {
    font-size: 3.5rem;
    margin-bottom: 0.8rem;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
  }
  .category-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    color: #fff;
    margin-bottom: 0.8rem;
  }
  .category-status {
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
    color: #ffd700;
    margin-top: auto;
  }
  .category-tile:not(.completed) .category-status {
    color: rgba(0, 229, 212, 0.6);
  }

  .reset-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.6);
    padding: 0.6rem 1.2rem;
    border-radius: 0.5rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
  }
  .reset-btn:hover {
    background: rgba(255, 62, 165, 0.2);
    color: #fff;
    border-color: #ff3ea5;
  }

  /* ============================
     QUESTION SCREEN
     ============================ */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 3rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .header-score {
    font-family: 'VT323', monospace;
    font-size: 1.8rem;
    color: #ffd700;
  }
  .header-category {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.7);
  }
  .header-progress {
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    color: #00e5d4;
  }
  .back-btn {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.7);
    padding: 0.5rem 1rem;
    border-radius: 0.4rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .quiz-body {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
    padding: 1rem 0;
  }
  .points-banner {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(2rem, 5vw, 3.5rem);
    background: linear-gradient(90deg, #ff3ea5, #00e5d4);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 3rem;
    text-shadow: 0 0 40px rgba(255, 62, 165, 0.4);
    letter-spacing: 3px;
  }
  .question-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    line-height: 1.4;
    color: #fff;
    margin-bottom: 4rem;
    padding: 0 1rem;
  }
  /* Při vyhodnocení — připomeneme otázku menším písmem nad odpovědí */
  .review-question {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    font-size: clamp(1.05rem, 1.8vw, 1.4rem);
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.65);
    font-style: italic;
    margin-bottom: 2rem;
    padding: 0 2rem;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .answer-block {
    margin-bottom: 3rem;
  }
  .answer-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 4.5vw, 3.5rem);
    color: #00e5d4;
    text-shadow: 0 0 30px rgba(0, 229, 212, 0.6);
    margin-bottom: 1.5rem;
    line-height: 1.3;
  }
  .answer-comment {
    font-family: 'Space Grotesk', sans-serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.5;
    max-width: 800px;
    margin: 0 auto;
  }

  .big-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.85rem, 1.4vw, 1.1rem);
    padding: 1.3rem 2.5rem;
    border-radius: 0.8rem;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.4;
  }
  .reveal-btn {
    background: linear-gradient(135deg, #ff3ea5, #b91d7a);
    color: #fff;
    border-color: #ff3ea5;
    box-shadow: 0 0 30px rgba(255, 62, 165, 0.4);
  }
  .reveal-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 62, 165, 0.7), 0 0 50px rgba(255, 62, 165, 0.5);
  }

  .answer-buttons {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .correct-btn {
    background: linear-gradient(135deg, #00e5d4, #009e8f);
    color: #0a0520;
    border-color: #00e5d4;
    box-shadow: 0 0 30px rgba(0, 229, 212, 0.4);
  }
  .correct-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(0, 229, 212, 0.7);
  }
  .wrong-btn {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.7);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .wrong-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    transform: translateY(-3px);
  }

  /* ============================
     BONUS SCREEN
     ============================ */
  .screen.bonus-mode {
    background:
      radial-gradient(ellipse at center, rgba(255, 215, 0, 0.25), transparent 60%),
      radial-gradient(ellipse at top, rgba(255, 140, 0, 0.2), transparent 50%);
    animation: fadeIn 0.5s ease-out;
  }
  .screen.bonus-mode::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg,
      rgba(255, 215, 0, 0.1) 0%,
      rgba(255, 140, 0, 0.15) 50%,
      rgba(255, 215, 0, 0.1) 100%);
    background-size: 200% 200%;
    animation: bonusShine 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .bonus-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.5rem, 3.5vw, 2.8rem);
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 140, 0, 0.6);
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 3px;
  }
  .bonus-subtitle {
    font-family: 'VT323', monospace;
    font-size: clamp(1.5rem, 2.5vw, 2rem);
    color: #fff;
    text-align: center;
    margin-bottom: 3rem;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  }
  .bonus-correct-btn {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #2d1b4e;
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
  }
  .bonus-correct-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 215, 0, 0.9);
  }
  .bonus-wrong-btn {
    background: linear-gradient(135deg, #ff4444, #aa1111);
    color: #fff;
    border-color: #ff4444;
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
  }
  .bonus-wrong-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 68, 68, 0.7);
  }
  .bonus-skip-btn {
    display: block;
    margin: 2rem auto 0;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.6);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 1.2rem;
    border-radius: 0.4rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .bonus-skip-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  /* ============================
     FINISHED SCREEN
     ============================ */
  .finished-wrap {
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
    padding-top: 4vh;
  }
  .finished-headline {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    color: #fff;
    margin-bottom: 2rem;
    letter-spacing: 2px;
  }
  .finished-score {
    font-family: 'VT323', monospace;
    font-size: clamp(5rem, 12vw, 9rem);
    color: #ffd700;
    text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.4);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .finished-score-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .finished-rating {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 500;
    color: #00e5d4;
    line-height: 1.5;
    margin-bottom: 3rem;
    padding: 2rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 1rem;
    border: 1px solid rgba(0, 229, 212, 0.3);
  }
  .play-again-btn {
    background: linear-gradient(135deg, #ff3ea5, #00e5d4);
    color: #fff;
    border: none;
    padding: 1.3rem 3rem;
    border-radius: 0.8rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.25s;
    box-shadow: 0 0 30px rgba(255, 62, 165, 0.5);
  }
  .play-again-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 62, 165, 0.8);
  }

  /* ============================
     VARIANT PICKER (výběr sady)
     ============================ */
  .picker-wrap {
    max-width: 720px;
    margin: 0 auto;
    text-align: center;
    padding-top: 2vh;
  }
  .picker-back {
    margin-bottom: 1.8rem;
  }
  .picker-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    margin-bottom: 0.5rem;
    letter-spacing: 1.5px;
    line-height: 1.4;
    background: linear-gradient(90deg, #ff3ea5, #00e5d4);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255, 62, 165, 0.3);
  }
  .picker-subtitle {
    font-family: 'Space Grotesk', sans-serif;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 2rem;
    font-size: 1rem;
    letter-spacing: 1.5px;
  }
  .variant-list {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .variant-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(255, 255, 255, 0.12);
    border-radius: 0.8rem;
    padding: 1rem 1.2rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .variant-btn:hover {
    background: rgba(255, 62, 165, 0.15);
    border-color: #ff3ea5;
    transform: translateX(5px);
    box-shadow: 0 0 20px rgba(255, 62, 165, 0.25);
  }
  .variant-btn-num {
    font-family: 'VT323', monospace;
    color: #00e5d4;
    font-size: 1.6rem;
    font-weight: bold;
    min-width: 1.5em;
    text-align: center;
    flex-shrink: 0;
  }
  .variant-btn-name {
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    font-weight: 600;
  }

  /* ============================
     SETUP HRÁČŮ (úvodní obrazovka)
     ============================ */
  .setup-wrap {
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
    padding-top: 3vh;
  }
  .setup-headline {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.1rem, 2vw, 1.6rem);
    color: #00e5d4;
    margin-bottom: 2rem;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0, 229, 212, 0.4);
  }
  .players-setup {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .player-setup-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255, 255, 255, 0.06);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 0.8rem;
    padding: 0.8rem 1rem;
  }
  .player-color-dot {
    width: 1.8rem;
    height: 1.8rem;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 12px currentColor;
  }
  .player-name-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1rem, 1.6vw, 1.3rem);
    font-weight: 500;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
  }
  .player-name-input:focus {
    border-bottom-color: #00e5d4;
  }
  .remove-player-btn {
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    background: rgba(255, 68, 68, 0.15);
    border: 1px solid rgba(255, 68, 68, 0.4);
    color: #ff8888;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .remove-player-btn:hover {
    background: rgba(255, 68, 68, 0.3);
    color: #fff;
  }
  .add-player-btn {
    background: rgba(0, 229, 212, 0.1);
    border: 2px dashed rgba(0, 229, 212, 0.4);
    color: #00e5d4;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 0.8rem 1.5rem;
    border-radius: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
  }

  /* --- Volba délky kola --- */
  .length-selector {
    margin: 0 0 2rem;
    padding: 1rem 1.2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 0.8rem;
    text-align: left;
  }
  .length-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .length-options {
    display: flex;
    gap: 0.6rem;
  }
  .length-btn {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    padding: 0.7rem 0.5rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(0.85rem, 1.3vw, 1rem);
    font-weight: 600;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .length-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .length-btn.active {
    background: rgba(0,229,212,0.15);
    border-color: #00e5d4;
    color: #00e5d4;
    box-shadow: 0 0 15px rgba(0,229,212,0.2);
  }
  .length-btn small {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    opacity: 0.7;
    margin-top: 0.2rem;
  }
  .add-player-btn:hover {
    background: rgba(0, 229, 212, 0.2);
    border-style: solid;
  }
  .add-player-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .start-btn {
    background: linear-gradient(135deg, #ff3ea5, #00e5d4);
    color: #fff;
    border: none;
    padding: 1.2rem 2.8rem;
    border-radius: 0.8rem;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.25s;
    box-shadow: 0 0 30px rgba(255, 62, 165, 0.4);
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 62, 165, 0.7);
  }

  /* --- Odpočet ve vyhodnocení (3s) --- */
  .countdown-block {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .countdown-label {
    font-family: 'VT323', monospace;
    font-size: clamp(1.4rem, 2.4vw, 1.9rem);
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 2px;
    margin-bottom: 0.4rem;
  }
  .countdown-num {
    display: inline-block;
    min-width: 1.5em;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: clamp(4rem, 9vw, 7rem);
    color: #ffd700;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.7), 0 0 60px rgba(255, 215, 0, 0.4);
    line-height: 1;
    animation: countdownPulse 1s ease-in-out infinite;
  }
  @keyframes countdownPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.12); opacity: 0.85; }
  }
  .countdown-hint {
    margin-top: 0.8rem;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.4);
    font-style: italic;
  }

  /* ============================
     DVOUHRÁČOVÝ REŽIM
     ============================ */
  /* --- Skóre hráčů na úvodu (N hráčů, wrap) --- */
  .dual-score {
    display: flex;
    justify-content: center;
    gap: 1.5rem 2.5rem;
    align-items: baseline;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .dual-score-item {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
  }
  .dual-score-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .dual-score-value {
    font-family: 'VT323', monospace;
    font-size: clamp(2.2rem, 4.5vw, 3.5rem);
    color: #ffd700;
    text-shadow: 0 0 18px rgba(255, 215, 0, 0.55);
  }
  /* --- Skóre v hlavičce kvízu (N hráčů, wrap) --- */
  .header-dual-score {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
  }
  .header-dual-score .ds-block {
    display: flex;
    align-items: baseline;
    gap: 0.35rem;
  }
  .header-dual-score .ds-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .header-dual-score .ds-val {
    color: #ffd700;
  }

  /* --- Dlaždice kategorie s dvojím skóre --- */
  .category-status-dual {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    font-family: 'VT323', monospace;
    font-size: 1.15rem;
    margin-top: auto;
    color: #ffd700;
    text-align: center;
  }
  .category-status-dual .csd-done {
    color: rgba(255, 215, 0, 0.85);
  }
  .category-status-dual .csd-row {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    font-size: 1.05rem;
  }

  /* --- Sloupce hráčů ve vyhodnocení (auto-fit pro N hráčů) --- */
  .player-columns {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.2rem;
    max-width: 1400px;
    margin: 0 auto 2rem;
  }
  .player-column {
    background: rgba(255, 255, 255, 0.04);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 1rem;
    padding: 1.3rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    /* Barva se nastavuje inline přes --pc-color CSS proměnnou */
    border-color: color-mix(in srgb, var(--pc-color, #ffffff) 50%, transparent);
    background: color-mix(in srgb, var(--pc-color, #ffffff) 6%, transparent);
  }
  .player-header {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.75rem, 1.1vw, 0.95rem);
    text-align: center;
    margin-bottom: 0.4rem;
    letter-spacing: 1.5px;
    color: var(--pc-color, #ffffff);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.3;
  }

  .player-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(0.95rem, 1.4vw, 1.1rem);
    padding: 1rem 1.1rem;
    border-radius: 0.6rem;
    border: 2px solid rgba(255, 255, 255, 0.15);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    background: rgba(0, 0, 0, 0.25);
    color: rgba(255, 255, 255, 0.75);
  }
  .player-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    transform: translateX(3px);
  }
  .player-btn.is-correct.selected {
    background: color-mix(in srgb, var(--pc-color, #00e5d4) 40%, transparent);
    border-color: var(--pc-color, #00e5d4);
    color: #fff;
    box-shadow: 0 0 25px color-mix(in srgb, var(--pc-color, #00e5d4) 50%, transparent);
  }
  .player-btn.is-wrong.selected {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.55);
    color: #fff;
  }
  .player-btn.is-bonus-correct.selected {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.55), rgba(255, 140, 0, 0.6));
    border-color: #ffd700;
    color: #2d1b4e;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
  }
  .player-btn.is-bonus-wrong.selected {
    background: linear-gradient(135deg, rgba(255, 68, 68, 0.55), rgba(170, 17, 17, 0.55));
    border-color: #ff4444;
    color: #fff;
    box-shadow: 0 0 25px rgba(255, 68, 68, 0.4);
  }
  .player-btn.is-skip.selected {
    background: rgba(255, 215, 0, 0.18);
    border-color: rgba(255, 215, 0, 0.6);
    color: #ffd700;
  }

  /* --- "Další odpověď" tlačítko ve vyhodnocení --- */
  .advance-btn {
    display: block;
    margin: 0 auto;
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    padding: 1.2rem 2.5rem;
    border-radius: 0.7rem;
    background: linear-gradient(135deg, #ff3ea5, #00e5d4);
    color: #fff;
    border: none;
    cursor: pointer;
    letter-spacing: 1.5px;
    box-shadow: 0 0 30px rgba(255, 62, 165, 0.4);
    transition: all 0.25s;
  }
  .advance-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 5px 40px rgba(255, 62, 165, 0.7);
  }
  .advance-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }
  .advance-hint {
    text-align: center;
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
  }

  /* --- Závěrečná obrazovka — auto-fit pro N hráčů --- */
  .finished-dual {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .finished-player {

  .finished-player-name {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.95rem, 1.5vw, 1.2rem);
    margin-bottom: 0.7rem;
    letter-spacing: 2px;
    color: var(--pc-color, #ffffff);
    word-wrap: break-word;
  }
  .finished-player-score {
    font-family: 'VT323', monospace;
    font-size: 4.5rem;
    color: #ffd700;
    text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .finished-player-score-label {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
  .finished-player-rating {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-style: italic;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.4;
  }
  .winner-banner {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    text-align: center;
    margin: 1.5rem 0 2.5rem;
    padding: 1.5rem;
    border-radius: 1rem;
    background: linear-gradient(90deg, rgba(0, 229, 212, 0.18), rgba(255, 62, 165, 0.18));
    border: 1px solid rgba(255, 215, 0, 0.4);
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    letter-spacing: 2px;
    line-height: 1.5;
  }

  /* ============================
     MOBILNÍ VERZE (< 768px)
     ============================ */
  @media (max-width: 768px) {
    /* Globální zmenšení paddingu */
    .screen {
      padding: 1rem 0.9rem 2.5rem;
    }

    /* --- Úvodní obrazovka --- */
    .game-title {
      font-size: clamp(1.1rem, 5.5vw, 1.8rem);
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    .home-header {
      margin-bottom: 1.5rem;
    }
    .total-score-label {
      font-size: 0.8rem;
      letter-spacing: 1.5px;
    }
    .dual-score {

    /* --- Dlaždice kategorií --- */

    }
    .category-icon {
      font-size: 2.6rem;

    }

    }

      font-size: 1rem;

    .category-status-dual .csd-row {
      font-size: 0.9rem;

    }

    /* --- Quiz hlavička --- */
    .quiz-header {
      flex-direction: column;

      gap: 0.7rem;
      padding-bottom: 0.9rem;

    }
    .header-right {

    }

    }

    /* --- Otázka / odpověď --- */
    .quiz-body {

    .points-banner {

    }
    .question-text {

    .answer-text {

    }
    .answer-comment {
      font-size: clamp(0.95rem, 3.5vw, 1.15rem);
      padding: 0 0.3rem;
    }
    .answer-block {
      margin-bottom: 1.8rem;
    }

    /* --- Velká tlačítka --- */
    .big-btn {
      font-size: 0.8rem;
      padding: 1rem 1.3rem;
      width: 100%;
      max-width: 100%;
      letter-spacing: 1px;
    }
    .answer-buttons {
      flex-direction: column;
      gap: 0.8rem;
    }

    /* --- Sloupce hráčů — stack vertikálně --- */
    .player-columns {
      grid-template-columns: 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .player-column {
      padding: 1rem 0.9rem;
      gap: 0.55rem;
    }
    .player-header {
      font-size: 0.85rem;
      letter-spacing: 1.5px;
    }

      padding: 0.85rem 0.9rem;

    /* --- Advance tlačítko --- */

    /* --- 3s odpočet --- */
    .countdown-block {

    }
    .countdown-label {
      font-size: clamp(1.1rem, 4vw, 1.5rem);

    .countdown-num {
      font-size: clamp(3.5rem, 14vw, 5.5rem);

    /* --- Závěrečná obrazovka --- */

    .finished-player {

    }
    .finished-player-score {

      font-size: 0.8rem;
    }
    .finished-player-rating {

    }
    .winner-banner {
      font-size: clamp(0.9rem, 4vw, 1.3rem);
      padding: 1rem;

    }
    .play-again-btn {
      font-size: 0.85rem;
      padding: 1rem 1.8rem;

    }

    /* --- Setup hráčů --- */
    .setup-wrap {
      padding-top: 1vh;

    .setup-headline {

      margin-bottom: 1.5rem;
      letter-spacing: 1.5px;

      padding: 0.7rem 0.8rem;
      gap: 0.7rem;
    }
    .player-color-dot {
      width: 1.4rem;
      height: 1.4rem;
    }
    .player-name-input {
      font-size: 1rem;
    }
    .add-player-btn {
      font-size: 0.9rem;
      padding: 0.7rem 1.2rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .start-btn {

    /* --- Reset tlačítko --- */
    .reset-btn {

  /* ============================
     VELMI MALÉ TELEFONY (< 380px)

  /* Hover efekty pouze na zařízeních s opravdovým hoverem (myš, ne touch) */

    .category-tile:hover,

    font-size: 0.85rem;

  }
</style>

<body>

  <!-- ============================
       SETUP SCREEN (zadání hráčů)
       ============================ -->
  <div id="screen-setup" class="screen active">
    <div class="setup-wrap">
      <h1 class="game-title">Nostalgický kvíz<br>90s / 00s</h1>
      <h2 class="setup-headline">Kdo dnes hraje?</h2>
      <div class="players-setup" id="players-setup"></div>
      <button class="add-player-btn" id="add-player-btn" onclick="addPlayer()">+ Přidat hráče</button>
      <div class="length-selector">
        <div class="length-label">Počet otázek v jednom kole</div>
        <div class="length-options" id="length-options">
          <button class="length-btn" data-n="3" onclick="setQuestionCount(3)">Rychlá<small>3 + bonus</small></button>
          <button class="length-btn" data-n="5" onclick="setQuestionCount(5)">Střední<small>5 + bonus</small></button>
          <button class="length-btn active" data-n="8" onclick="setQuestionCount(8)">Plná<small>8 + bonus</small></button>
        </div>
      </div>
      <div>
        <button class="start-btn" onclick="startGame()">Začít hru →</button>
      </div>
    </div>
  </div>

  <!-- ============================
       VARIANT PICKER (výběr sady otázek po kliknutí na kategorii)
       ============================ -->
  <div id="screen-variant-picker" class="screen">
    <div class="picker-wrap">
      <button class="back-btn picker-back" onclick="goHome()">← Zpět na výběr kategorie</button>
      <h2 class="picker-title">
        <span id="picker-icon"></span>&nbsp;<span id="picker-cat-name"></span>
      </h2>
      <p class="picker-subtitle">Vyber sadu otázek</p>
      <div class="variant-list" id="variant-list"></div>
    </div>
  </div>

  <!-- ============================
       HOME SCREEN
       ============================ -->
  <div id="screen-home" class="screen">
    <div class="home-header">
      <h1 class="game-title">Nostalgický kvíz<br>90s / 00s</h1>
      <div>
        <span class="total-score-label">Celkové skóre</span>
        <div class="dual-score" id="home-scores"></div>
      </div>
    </div>
    <div class="category-grid" id="category-grid"></div>
    <div class="keys-help">
      Klávesy: <span class="key-hint">Mezerník</span> další otázka / vyhodnocení
    </div>
    <button class="reset-btn" onclick="resetGame()">Resetovat hru</button>
  </div>

  <!-- ============================
       QUIZ SCREEN
       ============================ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="header-left">
        <button class="back-btn" onclick="goHome()">← Zpět</button>
        <div class="header-dual-score" id="quiz-score"></div>
      </div>
      <div class="header-right">
        <span class="header-category" id="quiz-category"></span>
        <span class="header-progress" id="quiz-progress"></span>
      </div>
    </div>
    <div class="quiz-body" id="quiz-body"></div>
  </div>

  <!-- ============================
       FINISHED SCREEN
       ============================ -->
  <div id="screen-finished" class="screen">
    <div class="finished-wrap">
      <h2 class="finished-headline">🎉 Konec hry 🎉</h2>
      <div class="finished-dual" id="finished-players"></div>
      <div class="winner-banner" id="winner-banner"></div>
      <button class="play-again-btn" onclick="resetGame()">Hrát znovu</button>
    </div>
  </div>

<script>
/* =================================================================
   OTÁZKY — 5 kategorií × (8 otázek + 1 bonus) = 45 otázek
   Vždy: q = otázka, a = správná odpověď, c = komentář moderátora
   Bodování: 100, 150, 200, 250, 300, 350, 400, 500 + bonus ±500
   ================================================================= */
const POINT_VALUES = [100, 150, 200, 250, 300, 350, 400, 500];
const BONUS_POINTS = 500;

const CATEGORIES = [
  {
    id: 'hudba',
    name: 'Hudba a rádio',
    icon: '🎵',
    variants: [
    {

const MIN_PLAYERS = 1;

let state = {
  /* Hráči: pole objektů { id, name, color, score } */
  players: [
    { id: 0, name: '', color: PLAYER_COLORS[0], score: 0 },
    { id: 1, name: '', color: PLAYER_COLORS[1], score: 0 }
  ],
  completedCategories: {},                  // { categoryId: { playerId: skore } }
  currentCategoryId: null,
  currentVariantIndex: 0,                   // která sada otázek se právě hraje (index v cat.variants)
  currentQuestionIndex: 0,
  phase: 'setup',                           // setup | home | variant-picker | collect | review | finished
  categoryRunning: {},                      // { playerId: skore }
  reviewMarks: {},                          // { playerId: null | 'correct' | 'wrong' | 'skip' }
  reviewSubPhase: 'reminder',
  reviewCountdown: 3,
  reviewTimerId: null,
  questionCount: 8                          // počet běžných otázek v sadě (bonus se přidává navíc); volitelné 3/5/8
};

const COUNTDOWN_SECONDS = 3;

/* =================================================================
   POMOCNÉ FUNKCE
   ================================================================= */
function getCategory(id) {
  return CATEGORIES.find(c => c.id === id);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatPoints(n) {
  return n.toLocaleString('cs-CZ') + ' b.';
}

function getPlayer(id) {
  return state.players.find(p => p.id === id);
}

function nextPlayerId() {
  return state.players.length === 0 ? 0 : Math.max(...state.players.map(p => p.id)) + 1;
}

function nextAvailableColor() {
  const used = new Set(state.players.map(p => p.color));
  return PLAYER_COLORS.find(c => !used.has(c)) || PLAYER_COLORS[state.players.length % PLAYER_COLORS.length];
}

/* =================================================================
   SETUP SCREEN — zadání jmen a počtu hráčů
   ================================================================= */
function renderSetup() {
  state.phase = 'setup';
  const container = document.getElementById('players-setup');
  container.innerHTML = '';
  state.players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'player-setup-row';
    row.innerHTML = `
      <div class="player-color-dot" style="background:${p.color};color:${p.color}"></div>
      <input class="player-name-input" type="text"
             value="${escapeHtml(p.name)}"
             placeholder="Jméno hráče"
             maxlength="20"
             oninput="updatePlayerName(${p.id}, this.value)"
             onkeydown="if(event.key==='Enter'){this.blur();startGame();}">
      ${state.players.length > MIN_PLAYERS
        ? `<button class="remove-player-btn" onclick="removePlayer(${p.id})" title="Odebrat hráče">×</button>`
        : ''}
    `;
    container.appendChild(row);
  });

  const addBtn = document.getElementById('add-player-btn');
  if (addBtn) {
    addBtn.disabled = state.players.length >= MAX_PLAYERS;
    addBtn.textContent = state.players.length >= MAX_PLAYERS
      ? `Maximum ${MAX_PLAYERS} hráčů`
      : '+ Přidat hráče';
  }

  // Aktivovat správné tlačítko délky kola
  document.querySelectorAll('.length-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.n, 10) === state.questionCount);
  });

  showScreen('screen-setup');
}

function addPlayer() {
  if (state.players.length >= MAX_PLAYERS) return;
  state.players.push({
    id: nextPlayerId(),
    name: '',
    color: nextAvailableColor(),
    score: 0
  });
  renderSetup();
}

function removePlayer(id) {
  if (state.players.length <= MIN_PLAYERS) return;
  state.players = state.players.filter(p => p.id !== id);
  renderSetup();
}

function updatePlayerName(id, name) {
  const p = getPlayer(id);
  if (p) p.name = name;
  // Záměrně bez re-renderu — nechceme ztrácet focus inputu
}

function startGame() {
  // Trim jmen, fallback na "Hráč N", reset skóre, zpět na home
  state.players.forEach((p, idx) => {
    p.name = (p.name || '').trim() || ('Hráč ' + (idx + 1));
    p.score = 0;
  });
  state.completedCategories = {};
  renderHome();
}

function setQuestionCount(n) {
  if (![3, 5, 8].includes(n)) return;
  state.questionCount = n;
  // Refresh active state na tlačítkách
  document.querySelectorAll('.length-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.n, 10) === n);
  });
}

/* =================================================================
   VARIANT PICKER — výběr sady otázek po kliknutí na kategorii
   ================================================================= */
function showVariantPicker(categoryId) {
  const cat = getCategory(categoryId);
  if (!cat || !cat.variants || cat.variants.length === 0) return;

  state.currentCategoryId = categoryId;

  // Pokud je jen jedna sada, přeskoč picker a rovnou hraj
  if (cat.variants.length === 1) {
    state.currentVariantIndex = 0;
    startCategory(categoryId);
    return;
  }

  state.phase = 'variant-picker';

  document.getElementById('picker-icon').textContent = cat.icon;
  document.getElementById('picker-cat-name').textContent = cat.name;

  const list = document.getElementById('variant-list');
  list.innerHTML = '';
  cat.variants.forEach((v, idx) => {
    const btn = document.createElement('button');
    btn.className = 'variant-btn';
    btn.innerHTML = `
      <span class="variant-btn-num">${idx + 1}</span>
      <span class="variant-btn-name">${escapeHtml(v.name)}</span>
    `;
    btn.onclick = () => selectVariant(idx);
    list.appendChild(btn);
  });

  showScreen('screen-variant-picker');
}

function selectVariant(idx) {
  state.currentVariantIndex = idx;
  startCategory(state.currentCategoryId);
}

function getCurrentVariant() {
  const cat = getCategory(state.currentCategoryId);
  if (!cat) return null;
  return cat.variants[state.currentVariantIndex] || cat.variants[0];
}

/* =================================================================
   HOME SCREEN
   ================================================================= */
function renderHome() {
  state.phase = 'home';
  state.currentCategoryId = null;
  state.currentQuestionIndex = 0;
  state.categoryRunning = {};
  state.reviewMarks = {};
  state.players.forEach(p => {
    state.categoryRunning[p.id] = 0;
    state.reviewMarks[p.id] = null;
  });

  // Skóre všech hráčů
  const scoreCont = document.getElementById('home-scores');
  scoreCont.innerHTML = '';
  state.players.forEach(p => {
    const item = document.createElement('div');
    item.className = 'dual-score-item';
    item.innerHTML = `
      <span class="dual-score-label" style="color:${p.color}">${escapeHtml(p.name)}</span>
      <span class="dual-score-value">${p.score.toLocaleString('cs-CZ')}</span>
    `;
    scoreCont.appendChild(item);
  });

  // Dlaždice kategorií
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const tile = document.createElement('div');
    const isDone = state.completedCategories[cat.id] !== undefined;
    tile.className = 'category-tile' + (isDone ? ' completed' : '');

    let statusHtml;
    if (isDone) {
      const cc = state.completedCategories[cat.id];
      const playerScores = state.players.map(p => {
        const val = (cc[p.id] !== undefined ? cc[p.id] : 0).toLocaleString('cs-CZ');
        return `<span style="color:${p.color}">${escapeHtml(p.name)} ${val}</span>`;
      }).join('<span style="opacity:0.35"> · </span>');
      statusHtml = `
        <div class="category-status-dual">
          <div class="csd-done">✓ Hotovo</div>
          <div class="csd-row">${playerScores}</div>
        </div>
      `;
    } else {
      statusHtml = `<div class="category-status">Kategorie čeká</div>`;
    }

    tile.innerHTML = `
      <div class="category-icon">${cat.icon}</div>
      <div class="category-name">${cat.name}</div>
      ${statusHtml}
    `;
    if (!isDone) {
      tile.onclick = () => showVariantPicker(cat.id);
    }
    grid.appendChild(tile);
  });

  // Pokud jsou všechny kategorie hotové → finish
  if (Object.keys(state.completedCategories).length === CATEGORIES.length) {
    showFinished();
    return;
  }

  showScreen('screen-home');
}

function goHome() {
  clearReviewTimer();
  renderHome();
}

/* =================================================================
   KATEGORIE — START
   ================================================================= */
function startCategory(categoryId) {
  state.currentCategoryId = categoryId;
  state.currentQuestionIndex = 0;
  state.categoryRunning = {};
  state.reviewMarks = {};
  state.players.forEach(p => {
    state.categoryRunning[p.id] = 0;
    state.reviewMarks[p.id] = null;
  });
  state.phase = 'collect';
  renderQuestionScreen();
}

/* =================================================================
   OTÁZKA / ODPOVĚĎ — RENDER
   ================================================================= */
function renderQuestionScreen() {
  const cat = getCategory(state.currentCategoryId);
  const isBonus = state.currentQuestionIndex === state.questionCount;

  const screen = document.getElementById('screen-quiz');
  // Bonus mode coloring
  if (isBonus) {
    screen.classList.add('bonus-mode');
  } else {
    screen.classList.remove('bonus-mode');
  }

  // Header — skóre všech hráčů
  document.getElementById('quiz-score').innerHTML = state.players.map(p => `
    <div class="ds-block">
      <span class="ds-name" style="color:${p.color}">${escapeHtml(p.name)}</span>
      <span class="ds-val">${p.score.toLocaleString('cs-CZ')} b.</span>
    </div>
  `).join('');
  document.getElementById('quiz-category').textContent = cat.icon + ' ' + cat.name;
  const isReview = state.phase === 'review';
  const progressLabel = isReview ? 'Vyhodnocení' : 'Otázka';
  document.getElementById('quiz-progress').textContent = isBonus
    ? (isReview ? '🌟 Bonus — vyhodnocení' : '🌟 BONUS')
    : progressLabel + ' ' + (state.currentQuestionIndex + 1) + ' / ' + (state.questionCount + 1);

  const body = document.getElementById('quiz-body');
  const variant = getCurrentVariant();

  if (state.phase === 'collect') {
    renderCollectPhase(body, variant, isBonus);
  } else if (state.phase === 'review') {
    renderReviewPhase(body, variant, isBonus);
  }

  showScreen('screen-quiz');
}

/* ----- Fáze 1: SBĚR — postupně 9 otázek bez odpovědí ----- */
function renderCollectPhase(body, variant, isBonus) {
  const q = isBonus ? variant.bonus : variant.questions[state.currentQuestionIndex];
  const points = isBonus ? BONUS_POINTS : POINT_VALUES[state.currentQuestionIndex];
  const isLast = isBonus; // bonusová otázka je vždy poslední (9.)

  const nextBtnLabel = isLast
    ? 'Konec kola — vyhodnotit →'
    : 'Další otázka →';

  if (isBonus) {
    body.innerHTML = `
      <div class="bonus-title">🌟 BONUSOVÁ OTÁZKA 🌟</div>
      <div class="bonus-subtitle">+500 za správně &nbsp;·&nbsp; −500 za špatně</div>
      <div class="question-text">${escapeHtml(q.q)}</div>
      <button class="big-btn reveal-btn" onclick="nextCollect()">${nextBtnLabel} &nbsp;[mezerník]</button>
    `;
  } else {
    body.innerHTML = `
      <div class="points-banner">ZA ${points} BODŮ</div>
      <div class="question-text">${escapeHtml(q.q)}</div>
      <button class="big-btn reveal-btn" onclick="nextCollect()">${nextBtnLabel} &nbsp;[mezerník]</button>
    `;
  }
}

/* ----- Fáze 2: VYHODNOCENÍ
   Sub-fáze:
   - 'reminder' = zopakuje otázku, běží 3s odpočet, pak se odhalí odpověď
   - 'reveal'   = ukáže odpověď + komentář + sloupce Petr/Martina pro označení
   --------------------------------------------------------------------------- */
function renderReviewPhase(body, variant, isBonus) {
  const q = isBonus ? variant.bonus : variant.questions[state.currentQuestionIndex];
  const points = isBonus ? BONUS_POINTS : POINT_VALUES[state.currentQuestionIndex];

  const banner = isBonus
    ? `<div class="bonus-title">🌟 BONUS — vyhodnocení 🌟</div>`
    : `<div class="points-banner">ZA ${points} BODŮ</div>`;

  /* --- Sub-fáze REMINDER: jen otázka + odpočet --- */
  if (state.reviewSubPhase === 'reminder') {
    body.innerHTML = `
      ${banner}
      <div class="question-text">${escapeHtml(q.q)}</div>
      <div class="countdown-block">
        <div class="countdown-label">Odpověď za</div>
        <div class="countdown-num" id="countdown-num">${state.reviewCountdown}</div>
        <div class="countdown-hint">[mezerník] zobrazí odpověď okamžitě</div>
      </div>
    `;
    return;
  }

  /* --- Sub-fáze REVEAL: odpověď + sloupce hráčů --- */
  const allMarked = state.players.every(p => state.reviewMarks[p.id] !== null);

  const renderColumn = (player) => {
    const sel = state.reviewMarks[player.id];
    const styleVar = `--pc-color: ${player.color}`;
    if (isBonus) {
      return `
        <div class="player-column" style="${styleVar}">
          <div class="player-header">${escapeHtml(player.name)}</div>
          <button class="player-btn is-bonus-correct${sel === 'correct' ? ' selected' : ''}"
                  onclick="markPlayer(${player.id}, 'correct')">
            ✅ Správně (+${BONUS_POINTS})
          </button>
          <button class="player-btn is-bonus-wrong${sel === 'wrong' ? ' selected' : ''}"
                  onclick="markPlayer(${player.id}, 'wrong')">
            ❌ Špatně (−${BONUS_POINTS})
          </button>
          <button class="player-btn is-skip${sel === 'skip' ? ' selected' : ''}"
                  onclick="markPlayer(${player.id}, 'skip')">
            Přeskočil/a (0)
          </button>
        </div>
      `;
    }
    return `
      <div class="player-column" style="${styleVar}">
        <div class="player-header">${escapeHtml(player.name)}</div>
        <button class="player-btn is-correct${sel === 'correct' ? ' selected' : ''}"
                onclick="markPlayer(${player.id}, 'correct')">
          ✅ Správně (+${points})
        </button>
        <button class="player-btn is-wrong${sel === 'wrong' ? ' selected' : ''}"
                onclick="markPlayer(${player.id}, 'wrong')">
          ❌ Špatně (+0)
        </button>
      </div>
    `;
  };

  const advanceLabel = (isBonus || state.currentQuestionIndex === state.questionCount) ? 'Konec kategorie →' : 'Další odpověď →';
  const hintText = state.players.length === 1
    ? 'Označ hráče a pokračuj'
    : 'Označ všechny hráče a pokračuj';

  body.innerHTML = `
    ${banner}
    <div class="review-question">${escapeHtml(q.q)}</div>
    <div class="answer-block">
      <div class="answer-text">${escapeHtml(q.a)}</div>
      <div class="answer-comment">${escapeHtml(q.c)}</div>
    </div>
    <div class="player-columns">
      ${state.players.map(renderColumn).join('')}
    </div>
    <button class="advance-btn" onclick="advanceReview()" ${allMarked ? '' : 'disabled'}>
      ${advanceLabel}
    </button>
    ${allMarked ? '' : `<div class="advance-hint">${hintText}</div>`}
  `;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* =================================================================
   AKCE
   - nextCollect: posun na další otázku ve fázi sběru
   - markPlayer: zaklikne výsledek pro jednoho hráče (toggle)
   - advanceReview: aplikuje skóre podle reviewMarks a jde dál (vyžaduje označení obou)
   ================================================================= */
function nextCollect() {
  if (state.phase !== 'collect') return;
  if (state.currentQuestionIndex < state.questionCount) {
    state.currentQuestionIndex += 1;
    renderQuestionScreen();
  } else {
    // Konec sběru — přepnout do vyhodnocení od první otázky (sub-fáze reminder + odpočet)
    state.phase = 'review';
    state.currentQuestionIndex = 0;
    state.players.forEach(p => state.reviewMarks[p.id] = null);
    enterReviewReminder();
  }
}

function markPlayer(playerId, result) {
  if (state.phase !== 'review') return;
  if (state.reviewSubPhase !== 'reveal') return;
  const p = getPlayer(playerId);
  if (!p) return;
  state.reviewMarks[playerId] = result;
  renderQuestionScreen();
}

function advanceReview() {
  if (state.phase !== 'review') return;
  if (state.reviewSubPhase !== 'reveal') return;
  if (!state.players.every(p => state.reviewMarks[p.id] !== null)) return;

  const isBonus = state.currentQuestionIndex === state.questionCount;
  const points = isBonus ? BONUS_POINTS : POINT_VALUES[state.currentQuestionIndex];

  // Aplikovat skóre podle označení každého hráče
  state.players.forEach(p => {
    const m = state.reviewMarks[p.id];
    if (isBonus) {
      if (m === 'correct') {
        p.score += BONUS_POINTS;
        state.categoryRunning[p.id] += BONUS_POINTS;
      } else if (m === 'wrong') {
        p.score -= BONUS_POINTS;
        state.categoryRunning[p.id] -= BONUS_POINTS;
      }
      // 'skip' = 0 bodů
    } else {
      if (m === 'correct') {
        p.score += points;
        state.categoryRunning[p.id] += points;
      }
      // 'wrong' = 0 bodů
    }
  });

  // Reset označení pro další otázku
  state.players.forEach(p => state.reviewMarks[p.id] = null);

  // Posun dál nebo finišovat kategorii
  if (state.currentQuestionIndex < state.questionCount) {
    state.currentQuestionIndex += 1;
    enterReviewReminder();
  } else {
    finishCategory();
  }
}

/* ----- Odpočet 3s mezi zopakováním otázky a odhalením odpovědi ----- */
function enterReviewReminder() {
  clearReviewTimer();
  state.reviewSubPhase = 'reminder';
  state.reviewCountdown = COUNTDOWN_SECONDS;
  renderQuestionScreen();
  state.reviewTimerId = setTimeout(tickCountdown, 1000);
}

function tickCountdown() {
  // Pojistka: pokud uživatel mezitím odešel z review nebo už se odhalilo
  if (state.phase !== 'review' || state.reviewSubPhase !== 'reminder') return;

  state.reviewCountdown -= 1;
  if (state.reviewCountdown <= 0) {
    revealAnswerNow();
    return;
  }
  // Update jen čísla, ne full re-render (aby nezačala blikat pulse-animace)
  const numEl = document.getElementById('countdown-num');
  if (numEl) numEl.textContent = state.reviewCountdown;
  state.reviewTimerId = setTimeout(tickCountdown, 1000);
}

function revealAnswerNow() {
  clearReviewTimer();
  if (state.phase !== 'review') return;
  state.reviewSubPhase = 'reveal';
  renderQuestionScreen();
}

function clearReviewTimer() {
  if (state.reviewTimerId !== null) {
    clearTimeout(state.reviewTimerId);
    state.reviewTimerId = null;
  }
}

function finishCategory() {
  const result = {};
  state.players.forEach(p => {
    result[p.id] = state.categoryRunning[p.id];
  });
  state.completedCategories[state.currentCategoryId] = result;
  renderHome();
}

/* =================================================================
   FINIŠ
   ================================================================= */
function showFinished() {
  // Sloupce všech hráčů (seřazené sestupně podle skóre)
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const cont = document.getElementById('finished-players');
  cont.innerHTML = sorted.map(p => `
    <div class="finished-player" style="--pc-color: ${p.color}">
      <div class="finished-player-name">${escapeHtml(p.name.toUpperCase())}</div>
      <div class="finished-player-score">${p.score.toLocaleString('cs-CZ')}</div>
      <div class="finished-player-score-label">bodů</div>
      <div class="finished-player-rating">${escapeHtml(getRating(p.score))}</div>
    </div>
  `).join('');

  // Vítěz / remíza
  const banner = document.getElementById('winner-banner');
  if (state.players.length === 1) {
    banner.textContent = `🎯 ${state.players[0].name.toUpperCase()}: ${state.players[0].score.toLocaleString('cs-CZ')} bodů`;
  } else {
    const top = sorted[0].score;
    const winners = sorted.filter(p => p.score === top);
    if (winners.length === state.players.length) {
      banner.textContent = '🤝 ÚPLNÁ REMÍZA! Všichni ' + top.toLocaleString('cs-CZ') + ' b.';
    } else if (winners.length > 1) {
      const names = winners.map(p => p.name.toUpperCase()).join(' & ');
      banner.textContent = '🤝 REMÍZA: ' + names + ' (' + top.toLocaleString('cs-CZ') + ' b.)';
    } else {
      const w = winners[0];
      const runnerUp = sorted.find(p => p.score < top);
      const diff = top - runnerUp.score;
      banner.textContent = '🏆 VÍTĚZÍ ' + w.name.toUpperCase() + ' (o ' + diff.toLocaleString('cs-CZ') + ' b. před druhým)';
    }
  }

  showScreen('screen-finished');
}

function getMaxScore() {
  // Max bodů na jednoho hráče za celou hru (10 kategorií × N otázek + bonus)
  let perCat = BONUS_POINTS;
  for (let i = 0; i < state.questionCount; i++) {
    perCat += POINT_VALUES[i] || 0;
  }
  return CATEGORIES.length * perCat;
}

function getRating(score) {
  // Hodnocení podle procenta z maxima — funguje pro 3/5/8 otázek
  const max = getMaxScore();
  const pct = max > 0 ? score / max : 0;
  if (pct <= 0.20) return 'Vy jste 90. léta strávili kde? V cizině?';
  if (pct <= 0.40) return 'Solidně, ale Nokia byste v životě neopravili.';
  if (pct <= 0.65) return 'Vy jste tu dobu fakt žili.';
  if (pct <= 0.85) return 'Klobouk dolů, vy jste jí přímo dýchali.';
  return 'Vy JSTE 90s. Můžete jít učit na vysokou.';
}

/* =================================================================
   RESET
   ================================================================= */
function resetGame() {
  const hasScore = state.players.some(p => p.score !== 0);
  if (hasScore || Object.keys(state.completedCategories).length > 0) {
    if (!confirm('Opravdu resetovat celou hru? Skóre i postup se smaže.')) return;
  }
  clearReviewTimer();
  // Resetuje skóre, ale ZACHOVÁVÁ jména a barvy hráčů a vrátí se na setup
  state.players.forEach(p => p.score = 0);
  state.completedCategories = {};
  state.currentCategoryId = null;
  state.currentQuestionIndex = 0;
  state.categoryRunning = {};
  state.reviewMarks = {};
  state.reviewSubPhase = 'reminder';
  state.reviewCountdown = COUNTDOWN_SECONDS;
  state.reviewTimerId = null;
  renderSetup();
}

/* =================================================================
   KLÁVESOVÉ ZKRATKY
   ================================================================= */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Mezerník / Enter
  //   - collect:  další otázka
  //   - review reminder:  okamžitě odhalit odpověď (přeskočit odpočet)
  //   - review reveal (všichni hráči označeni):  další odpověď
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state.phase === 'collect') {
      e.preventDefault();
      nextCollect();
    } else if (state.phase === 'review' && state.reviewSubPhase === 'reminder') {
      e.preventDefault();
      revealAnswerNow();
    } else if (state.phase === 'review' && state.reviewSubPhase === 'reveal'
               && state.players.every(p => state.reviewMarks[p.id] !== null)) {
      e.preventDefault();
      advanceReview();
    }
    return;
  }

  // Esc = zpět domů (ze hry)
  if (e.key === 'Escape') {
    if (state.phase === 'collect' || state.phase === 'review') {
      e.preventDefault();
      goHome();
    }
  }
});

/* =================================================================
   INIT — začínáme na setup obrazovce (zadání jmen hráčů)
   ================================================================= */
renderSetup();
</script>
</body>
</html>
